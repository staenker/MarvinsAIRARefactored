<!doctype html>

<html>

<head>
    <meta charset="utf-8">
    <title id="headTitle">MAIRA Speech-To-Text Bridge</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <img id="mairaLogo" src="app-menu-logo.png" height=96 />

    <h3 id="bodyTitle">MAIRA Speech-To-Text Bridge</h3>

    <p id="hint">Choose an audio capture device, then click the enable button.</p>

    <label>
        <select id="micSelect"></select>
    </label>

    <button id="enable">Enable Speech-To-Text</button>

    <img id="disconnected" src="disconnected.png" height="48" />
    <img id="waiting" src="waiting.png" height="48" class="hidden"/>
    <img id="listening" src="listening.png" height="48" class="hidden"/>

    <script src="stt.js"></script>

</body>

</html>
